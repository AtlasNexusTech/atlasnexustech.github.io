<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Atlas Nexus — Markets Dashboard</title>
<style>body{background:#06070b;color:#f8fafc;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Inter,sans-serif}
.loading{text-align:center}.loading h1{font-size:1.5em;margin-bottom:8px}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.1);border-top-color:#38bdf8;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}</style>
</head>
<body>
<div class="loading">
<div class="spinner"></div>
<h1>Loading Markets Dashboard...</h1>
<p style="color:#64748b;font-size:.85em">Fetching latest data</p>
</div>
<script>
// Load the full dashboard from jsDelivr (bypasses GitHub Pages CDN)
fetch('https://cdn.jsdelivr.net/gh/AtlasNexusTech/atlasnexustech.github.io@main/markets-dashboard/full-dashboard.html')
  .then(r => r.text())
  .then(html => {
    document.open();
    document.write(html);
    document.close();
  })
  .catch(() => {
    document.querySelector('.loading').innerHTML = '<h1>⚠️ Failed to load</h1><p><a href="https://cdn.jsdelivr.net/gh/AtlasNexusTech/atlasnexustech.github.io@main/markets-dashboard/full-dashboard.html">Open directly</a></p>';
  });
</script>
</body>
</html>
