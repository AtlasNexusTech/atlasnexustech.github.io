<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chargement…</title>
    <meta name="description" content="Site vitrine d'artisan">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7C3AED">
    <link rel="icon" href="images/icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">

    <style>
        html { scroll-behavior: smooth; }
        .fade-in { animation: fadeIn 0.7s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <link rel="canonical" href="https://atlasnexus.tech/pwa-template/">
</head>
<body class="bg-stone-50 text-stone-800 antialiased" style="font-family:Inter,system-ui,sans-serif">
<div id="app"><div class="flex items-center justify-center min-h-screen"><div class="animate-pulse text-stone-400">Chargement…</div></div></div>

<script>
// === PWA Registration ===
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

// === Load config and render ===
fetch('config.json')
    .then(r => r.json())
    .then(cfg => {
        const b = cfg.business, d = cfg.design, svc = cfg.services, gal = cfg.gallery, feats = cfg.features, seo = cfg.seo;
        const p = d.primary, pd = d.primaryDark;

        // SEO
        document.title = seo.title;
        document.querySelector('meta[name="description"]').content = seo.description;
        document.querySelector('meta[name="theme-color"]').content = p;

        // Tailwind colors
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 600: p, 700: pd, 500: d.accent },
                    }
                }
            }
        };

        // Service cards
        const serviceCards = svc.map(s => `
            <div class="bg-white rounded-xl p-5 flex items-start gap-3 shadow-sm hover:shadow-md transition-shadow">
                <span class="text-2xl shrink-0">${s.icon}</span>
                <div><h4 class="font-semibold text-stone-800">${s.title}</h4><p class="text-sm text-stone-500">${s.desc}</p></div>
            </div>`).join('');

        // Feature cards
        const featureCards = feats.map(f => `
            <div class="text-center">
                <div class="w-14 h-14 bg-white/10 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-3">${f.icon}</div>
                <h3 class="font-bold text-lg mb-1">${f.title}</h3>
                <p class="text-white/70 text-sm">${f.desc}</p>
            </div>`).join('');

        // Gallery
        const galleryItems = gal.map(g => `
            <div class="rounded-xl overflow-hidden shadow-sm"><img src="${g.src}" alt="${g.alt}" class="w-full object-cover" style="aspect-ratio:4/3" loading="lazy"></div>`).join('');

        // Render
        document.getElementById('app').innerHTML = `
<!-- NAV -->
<nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-stone-200 shadow-sm">
    <div class="max-w-6xl mx-auto px-4">
        <div class="flex items-center justify-between h-16">
            <a href="#accueil" class="flex items-center gap-3 no-underline">
                <div class="w-10 h-10 rounded-lg flex items-center justify-center text-white font-bold shadow-md" style="background:${p}">${d.logoEmoji}</div>
                <div class="hidden sm:block">
                    <div class="font-semibold text-stone-900">${b.shortName}</div>
                    <div class="text-xs text-stone-500">${b.slogan}</div>
                </div>
            </a>
            <div class="hidden md:flex items-center gap-2">
                <a href="#accueil" class="px-3 py-2 text-sm font-medium text-stone-600 hover:text-stone-900 rounded-lg">Accueil</a>
                <a href="#services" class="px-3 py-2 text-sm font-medium text-stone-600 hover:text-stone-900 rounded-lg">Services</a>
                <a href="#galerie" class="px-3 py-2 text-sm font-medium text-stone-600 hover:text-stone-900 rounded-lg">Réalisations</a>
                <a href="#contact" class="ml-2 px-4 py-2 text-sm font-semibold text-white rounded-lg shadow-sm" style="background:${p}">Devis gratuit ✦</a>
            </div>
        </div>
    </div>
</nav>

<!-- HERO -->
<section id="accueil" class="relative min-h-[80vh] flex items-center bg-stone-900 overflow-hidden">
    <div class="absolute inset-0"><img src="${d.heroImage}" alt="${b.name}" class="w-full h-full object-cover opacity-55"></div>
    <div class="absolute inset-0" style="background:linear-gradient(135deg,rgba(0,0,0,.65),rgba(0,0,0,.35) 50%,rgba(${parseInt(p.slice(1,3),16)},${parseInt(p.slice(3,5),16)},${parseInt(p.slice(5,7),16)},.18) 100%)"></div>
    <div class="relative max-w-6xl mx-auto px-4 py-20">
        <div class="max-w-2xl fade-in">
            <span class="inline-block px-3 py-1 text-xs font-semibold text-white/80 bg-white/10 rounded-full backdrop-blur-sm mb-6">${d.logoEmoji} ${b.since}</span>
            <h1 class="text-4xl sm:text-5xl lg:text-6xl font-bold text-white leading-tight mb-6" style="font-family:'${d.fontHeading}',Georgia,serif">${b.name}<br><span style="color:${d.accent}">${b.slogan}</span></h1>
            <p class="text-lg text-stone-200 leading-relaxed mb-8 max-w-lg">${b.description}</p>
            <a href="#contact" class="inline-flex items-center gap-2 px-6 py-3 text-white font-semibold rounded-xl shadow-lg" style="background:${p}">Demander un devis gratuit →</a>
        </div>
    </div>
</section>

<!-- ABOUT -->
<section class="py-16 bg-white">
    <div class="max-w-6xl mx-auto px-4">
        <div class="grid md:grid-cols-2 gap-12 items-center">
            <div>
                <h2 class="text-3xl sm:text-4xl font-bold text-stone-900 mb-6" style="font-family:'${d.fontHeading}',Georgia,serif">${b.name}<br><span style="color:${p}">à votre service</span></h2>
                <p class="text-stone-600 leading-relaxed mb-4">${b.description}</p>
                <p class="text-stone-600 leading-relaxed mb-6"><strong>Zone d'intervention :</strong> ${b.zone}</p>
                <div class="flex flex-wrap gap-4">
                    <div class="flex items-center gap-2"><span class="w-10 h-10 rounded-lg flex items-center justify-center font-bold text-white" style="background:${p}">✓</span><span class="text-sm text-stone-600">Devis gratuit</span></div>
                    <div class="flex items-center gap-2"><span class="w-10 h-10 rounded-lg flex items-center justify-center font-bold text-white" style="background:${p}">✓</span><span class="text-sm text-stone-600">Travail soigné</span></div>
                </div>
            </div>
            <div class="relative">
                <img src="${d.heroImage}" alt="${b.name}" class="rounded-2xl shadow-2xl w-full object-cover" style="aspect-ratio:4/3">
                <div class="absolute -bottom-4 -right-4 px-5 py-3 rounded-xl shadow-lg text-white" style="background:${p}"><div class="text-2xl font-bold">Devis</div><div class="text-sm opacity-90">gratuit</div></div>
            </div>
        </div>
    </div>
</section>

<!-- SERVICES -->
<section id="services" class="py-16 bg-stone-100">
    <div class="max-w-6xl mx-auto px-4">
        <h2 class="text-3xl sm:text-4xl font-bold text-center text-stone-900 mb-10" style="font-family:'${d.fontHeading}',Georgia,serif">Nos <span style="color:${p}">Services</span></h2>
        <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">${serviceCards}</div>
    </div>
</section>

<!-- GALLERY -->
<section id="galerie" class="py-16 bg-white">
    <div class="max-w-6xl mx-auto px-4">
        <h2 class="text-3xl sm:text-4xl font-bold text-center text-stone-900 mb-10" style="font-family:'${d.fontHeading}',Georgia,serif">Nos <span style="color:${p}">Réalisations</span></h2>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">${galleryItems}</div>
    </div>
</section>

<!-- FEATURES -->
<section class="py-16 text-white" style="background:${pd}">
    <div class="max-w-6xl mx-auto px-4">
        <h2 class="text-3xl sm:text-4xl font-bold text-center mb-10" style="font-family:'${d.fontHeading}',Georgia,serif">Pourquoi nous <span style="color:${d.accent}">choisir</span> ?</h2>
        <div class="grid sm:grid-cols-3 gap-8">${featureCards}</div>
    </div>
</section>

<!-- CONTACT -->
<section id="contact" class="py-16 bg-stone-100">
    <div class="max-w-6xl mx-auto px-4">
        <h2 class="text-3xl sm:text-4xl font-bold text-center text-stone-900 mb-8" style="font-family:'${d.fontHeading}',Georgia,serif">Contact & <span style="color:${p}">Devis</span></h2>
        <div class="grid md:grid-cols-2 gap-8 max-w-4xl mx-auto">
            <div class="space-y-4">
                <div class="bg-white rounded-xl p-4 shadow-sm"><span class="font-semibold">📍 Adresse</span><p class="text-sm text-stone-600">${b.address}</p></div>
                <div class="bg-white rounded-xl p-4 shadow-sm"><span class="font-semibold">📞 Téléphone</span><p class="font-medium" style="color:${p}">${b.phone}</p></div>
                <div class="bg-white rounded-xl p-4 shadow-sm"><span class="font-semibold">✉️ Email</span><p class="text-sm" style="color:${p}">${b.email}</p></div>
                <div class="bg-white rounded-xl p-4 shadow-sm"><span class="font-semibold">🕐 Intervention</span><p class="text-sm text-stone-600">${b.zone}</p></div>
            </div>
            <div class="bg-white rounded-xl p-6 shadow-sm">
                <h3 class="font-bold text-lg mb-4">Demande de devis</h3>
                <form class="space-y-3" onsubmit="alert('Merci ! Nous vous recontacterons rapidement.')">
                    <input type="text" placeholder="Votre nom" class="w-full px-4 py-2.5 border border-stone-200 rounded-xl text-sm" required>
                    <input type="tel" placeholder="Téléphone" class="w-full px-4 py-2.5 border border-stone-200 rounded-xl text-sm" required>
                    <textarea rows="3" placeholder="Votre message…" class="w-full px-4 py-2.5 border border-stone-200 rounded-xl text-sm resize-none" required></textarea>
                    <button class="w-full py-3 text-white font-semibold rounded-xl" style="background:${p}">Envoyer ✦</button>
                </form>
            </div>
        </div>
    </div>
</section>

<!-- FOOTER -->
<footer class="bg-stone-900 text-stone-400 py-8">
    <div class="max-w-6xl mx-auto px-4 text-center text-xs">
        <p class="text-white font-semibold">${b.name}</p>
        <p>${b.address} — ${b.phone}</p>
        <p>Siret : ${b.siret}</p>
        <p class="text-stone-500 mt-2">© ${new Date().getFullYear()} ${b.name}. Propulsé par <a href="https://atlasnexus.tech" class="underline" style="color:${p}">AtlasNexus</a></p>
    </div>
</footer>
`;

        // Install prompt
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;
            const btn = document.createElement('div');
            btn.innerHTML = `<button style="position:fixed;bottom:80px;left:12px;background:${p};color:white;padding:8px 14px;border-radius:10px;font-size:12px;z-index:9999;font-family:system-ui;box-shadow:0 4px 12px rgba(0,0,0,.2);border:none;cursor:pointer">📲 Installer l'app</button>`;
            document.body.appendChild(btn);
            btn.querySelector('button').onclick = () => { deferredPrompt.prompt(); btn.remove(); };
        });
    });
</script>
</body>
</html>
